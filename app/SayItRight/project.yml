name: SayItRight
options:
  bundleIdPrefix: io.mattern.say-it-right
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  SayItRight:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: .
        excludes:
          - "**/.DS_Store"
          - project.yml
          - ExportOptions.plist
          - build/
          - Tests/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mattern.say-it-right
        DEVELOPMENT_TEAM: LC9HD3YWNR
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Say it right!"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Access parent settings"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Voice input for speaking exercises"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record your voice for speaking exercises"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        SUPPORTS_MACCATALYST: false

  SayItRightTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SayItRight_${platform}
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
